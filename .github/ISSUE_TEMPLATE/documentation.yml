name: Documentation (文件編修)
description: 提報文件錯誤、遺漏或需要新增/修改的內容 (Report documentation issues or suggest improvements)
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        協助改善專案文件，請填寫以下簡單資訊。

  - type: textarea
    id: doc_location
    attributes:
      label: 1. 相關文件與問題描述 (Location & Description)
      description: 指明是哪份文件、哪個章節，以及需要修正的地方。
      placeholder: 例如 docs/api-documentation.md 中的 /api/rooms 路由範例，欄位名稱寫錯了。
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: 2. 建議修改內容 (Proposed Changes)
      description: 具體要怎麼修改，或你建議的寫法（選填）。
      placeholder: 將 type 欄位說明改為 "group" | "private"
    validations:
      required: false
