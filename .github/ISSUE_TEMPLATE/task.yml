name: Task (開發任務)
description: 功能開發、重構、修補或清理任務 (For developers / team tasks)
title: "[Task] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        填寫此任務單以利追蹤功能開發或技術修補進度。

  - type: textarea
    id: background
    attributes:
      label: 1. 任務背景與目標 (Background & Goal)
      description: 說明此任務的目的與需要解決的核心問題。
      placeholder: 例如：因應新版 DB 設計，需要將 API response 中的舊欄位做對應的轉換與適配...
    validations:
      required: true

  - type: textarea
    id: current_status
    attributes:
      label: 2. 目前狀態 (Current Status)
      description: 簡述現有程式碼、DB schema 的現況（選填）。
      placeholder: backend/src/controllers/ 仍在使用舊屬性。
    validations:
      required: false

  - type: textarea
    id: work_items
    attributes:
      label: 3. 具體工作項目 (Work Items)
      description: 列出待完成的子任務（可用 - [ ] 格式）。
      placeholder: |
        - [ ] 修改 backend controller 邏輯
        - [ ] 更新單元測試與整合測試
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 4. 驗收標準 (Acceptance Criteria)
      description: 清晰的完成指標（選填）。
      placeholder: 所有測試皆通過，API response 與前端規格對齊。
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 5. 優先度 (Priority)
      options:
        - P0 — Blocker / 需優先處理
        - P1 — 本 Sprint 必須完成
        - P2 — 本 Sprint 盡量完成
        - P3 — Backlog
    validations:
      required: true

  - type: input
    id: related_issues
    attributes:
      label: 6. 相關 Issue / PR
      description: 關聯的編號（選填）。
      placeholder: "#123"
