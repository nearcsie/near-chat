name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix backend install
      - run: pnpm --prefix backend run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix backend install
      - name: Create env files
        run: |
          printf 'POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=postgres\nPOSTGRES_DB=ntnu_db\nDATABASE_URL=postgresql://postgres:postgres@db:5432/ntnu_db\nJWT_SECRET=ci_test_secret\nNODE_ENV=development\nPORT=4000\nNEXT_PUBLIC_API_URL=http://localhost:4000\n' > .env
          echo "DATABASE_URL_TEST=postgresql://postgres:postgres@db-test:5432/ntnu_test" > backend/.env.test
      - name: Start services
        run: |
          docker compose up -d db
          until docker compose exec -T db pg_isready -U postgres; do sleep 1; done
          pnpm --prefix backend run test:db:up
      - name: Apply migration to test database
        run: |
          docker compose run --rm --no-deps \
            -e DATABASE_URL=postgresql://postgres:postgres@db-test:5432/ntnu_test \
            backend pnpm run migrate:up
      - name: Run integration tests
        run: docker compose run --rm --no-deps backend pnpm run test:integration
