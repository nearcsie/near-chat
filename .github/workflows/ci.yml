name: CI

on:
  push:
    branches: [main, dev, "feat/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix frontend install
      - run: pnpm --prefix frontend exec tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix backend install
      - run: pnpm --prefix backend run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ntnu_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5433/ntnu_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix backend install
      - run: DATABASE_URL=$DATABASE_URL_TEST pnpm --prefix backend run migrate:up
      - run: pnpm --prefix backend run test:integration

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ntnu_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5433/ntnu_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm --prefix backend install
      - run: DATABASE_URL=$DATABASE_URL_TEST pnpm --prefix backend run migrate:up
      - run: pnpm --prefix backend run test:e2e

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan dependencies for vulnerabilities
        uses: OWASP/cve-lite-cli@v1
        with:
          all: "true"
          verbose: "true"
          fail-on: high
          sarif: "true"
      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cve-lite.sarif

