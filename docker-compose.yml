services:
  db:
    image: postgres:18-alpine
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4005:4000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RATE_LIMIT_DISABLED=${RATE_LIMIT_DISABLED}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CI=true
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - ./shared:/shared:ro
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${UPLOADS_MOUNT_SOURCE:-app_uploads}:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - ALLOWED_DEV_ORIGINS=${ALLOWED_DEV_ORIGINS}
      - CI=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - ./shared:/shared:ro
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  app_uploads:
