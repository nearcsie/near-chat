services:
  db:
    image: postgres:18-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4005:4000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RATE_LIMIT_DISABLED=${RATE_LIMIT_DISABLED}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ATTACHMENT_TYPE_RESTRICTION_ENABLED=${ATTACHMENT_TYPE_RESTRICTION_ENABLED:-false}
      - ATTACHMENT_ALLOWED_MIME_TYPES=${ATTACHMENT_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/gif,application/pdf,application/zip,text/plain}
      - ATTACHMENT_ALLOWED_EXTENSIONS=${ATTACHMENT_ALLOWED_EXTENSIONS:-.jpg,.jpeg,.png,.gif,.pdf,.zip,.txt}
      - ATTACHMENT_MAX_BYTES=${ATTACHMENT_MAX_BYTES:-10485760}
      - CI=true
    volumes:
      - ./backend:/app
      - ${UPLOADS_MOUNT_SOURCE:-app_uploads}:/app/uploads
      - /app/node_modules
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - ./shared:/shared:ro
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm run migrate:up && pnpm dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - ALLOWED_DEV_ORIGINS=${ALLOWED_DEV_ORIGINS}
      - CI=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - ./shared:/shared:ro
    depends_on:
      - backend

volumes:
  pgdata:
  app_uploads:

networks:
  default:
    name: near-chat_network
